# MCP 服务器配置
# 文档: https://modelcontextprotocol.io

servers:
  # 测试服务器 - 计算器和天气查询
  - name: "test-tools"
    transport: "stdio"
    command: "python"
    args: ["mcp_servers/test_server.py"]
    enabled: true

  # 文件系统服务器
  - name: "filesystem"
    transport: "stdio"
    command: "cmd"
    args: ["/c", "npx", "-y", "@modelcontextprotocol/server-filesystem", "D:\\PythonProject\\my-agent\\wyf-agent"]
    enabled: true

  # 数据库服务器
  - name: "database"
    transport: "stdio"
    command: "python"
    args: ["mcp_servers/db_server.py"]
    enabled: true

  # 搜索服务器
  - name: "search"
    transport: "stdio"
    command: "python"
    args: ["mcp_servers/search_server.py"]
    enabled: true

  # API 服务器
  - name: "api"
    transport: "stdio"
    command: "python"
    args: ["mcp_servers/api_server.py"]
    enabled: true

  # GitHub 服务器
  - name: "github"
    transport: "stdio"
    command: "cmd"
    args: ["/c", "npx", "-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "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"
    enabled: true
