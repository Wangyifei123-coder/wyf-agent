# MCP 服务器配置
# 文档: https://modelcontextprotocol.io

servers:
  # 测试服务器 - 计算器和天气查询
  - name: "test-tools"
    transport: "stdio"
    command: "python"
    args: ["mcp_servers/test_server.py"]
    enabled: true

  # 数据库服务器 - SQLite 只读查询
  - name: "database"
    transport: "stdio"
    command: "python"
    args: ["mcp_servers/db_server.py"]
    enabled: true

  # 网页搜索服务器
  - name: "search"
    transport: "stdio"
    command: "python"
    args: ["mcp_servers/search_server.py"]
    enabled: true

  # HTTP API 服务器
  - name: "api"
    transport: "stdio"
    command: "python"
    args: ["mcp_servers/api_server.py"]
    enabled: true

  # 文件系统服务器
  - name: "filesystem"
    transport: "stdio"
    command: "cmd"
    args: ["/c", "npx", "-y", "@modelcontextprotocol/server-filesystem", "D:\\PythonProject\\my-agent\\wyf-agent"]
    enabled: true
